name: Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}

jobs:
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy infrastructure (Bicep)
        id: infra
        uses: azure/arm-deploy@v2
        with:
          resourceGroupName: ${{ env.AZURE_RESOURCE_GROUP }}
          template: ./infra/main.bicep
          # Edit infra/main.parameters.example.json to customise your deployment
          # (base name, region, schedule, Python version). No secrets are stored
          # in this file so it is safe to commit alongside the template.
          parameters: ./infra/main.parameters.example.json

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install runtime dependencies
        run: pip install --target=".python_packages/lib/site-packages" -r requirements.txt

      - name: Deploy function app code
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ steps.infra.outputs.functionAppName }}
          package: "."
